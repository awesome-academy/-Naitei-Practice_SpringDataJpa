<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Systems CRUD Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0 auto; max-width: 900px; padding: 2em; }
        table { width: 100%; border-collapse: collapse; margin-top: 1em; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        form { background: #f9f9f9; padding: 1.5em; border-radius: 5px; border: 1px solid #ddd; }
        form div { margin-bottom: 1em; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="date"], select { width: 100%; padding: 8px; box-sizing: border-box; }
        .actions button { margin-right: 5px; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer; }
        .btn-save { background-color: #4CAF50; color: white; }
        .btn-cancel { background-color: #f44336; color: white; }
        .btn-edit { background-color: #008CBA; color: white; }
        .btn-delete { background-color: #555555; color: white; }
        h1, h2 { color: #333; }
    </style>
</head>
<body>

    <h1>AI System Management</h1>

    <form id="aiSystemForm">
        <h2>Add / Edit System</h2>
        <input type="hidden" id="systemId">
        
        <div>
            <label for="name">System Name:</label>
            <input type="text" id="name" required>
        </div>
        <div>
            <label for="developer">Developer:</label>
            <input type="text" id="developer" required>
        </div>
        <div>
            <label for="launchDate">Launch Date:</label>
            <input type="date" id="launchDate" required>
        </div>
        <div>
            <label for="version">Version:</label>
            <input type="text" id="version">
        </div>
        <div>
            <label for="type">Type:</label>
            <select id="type" required>
                <option value="LANGUAGE_MODEL">Language Model</option>
                <option value="IMAGE_GENERATION">Image Generation</option>
                <option value="DATA_ANALYSIS">Data Analysis</option>
                <option value="GAME_PLAYING">Game Playing</option>
                <option value="RECOMMENDATION_ENGINE">Recommendation Engine</option>
            </select>
        </div>
        <div>
            <label for="status">Status:</label>
            <select id="status" required>
                <option value="IN_DEVELOPMENT">In Development</option>
                <option value="ACTIVE">Active</option>
                <option value="DECOMMISSIONED">Decommissioned</option>
                <option value="ARCHIVED">Archived</option>
            </select>
        </div>
        <button type="submit" class="btn-save">Save System</button>
        <button type="button" id="cancelButton" class="btn-cancel">Cancel</button>
    </form>

    <!-- BẢNG HIỂN THỊ DANH SÁCH -->
    <h2>List of AI Systems</h2>
    <table id="systemsTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Developer</th>
                <th>Version</th>
                <th>Type</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <script>
        const API_URL = 'http://localhost:8080/classic-spring-jpa-demo/api/ai-systems';
        const form = document.getElementById('aiSystemForm');
        const cancelButton = document.getElementById('cancelButton');

        // Hàm Reset Form về trạng thái ban đầu
        function resetForm() {
            form.reset();
            document.getElementById('systemId').value = '';
        }
        
        async function fetchSystems() {
            try {
                const response = await fetch(API_URL);
                const systems = await response.json();
                const tableBody = document.querySelector('#systemsTable tbody');
                tableBody.innerHTML = ''; 

                systems.forEach(system => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${system.name}</td>
                        <td>${system.developer}</td>
                        <td>${system.version}</td>
                        <td>${system.type}</td>
                        <td>${system.status}</td>
                        <td class="actions">
                            <button class="btn-edit" onclick='handleEdit(${JSON.stringify(system)})'>Edit</button>
                            <button class="btn-delete" onclick="handleDelete(${system.id})">Delete</button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Error fetching systems:', error);
            }
        }
        
        function handleEdit(system) {
            document.getElementById('systemId').value = system.id;
            document.getElementById('name').value = system.name;
            document.getElementById('developer').value = system.developer;
            document.getElementById('launchDate').value = system.launchDate;
            document.getElementById('version').value = system.version;
            document.getElementById('type').value = system.type;
            document.getElementById('status').value = system.status;
            window.scrollTo(0, 0);
        }

        async function handleDelete(id) {
            if (confirm('Are you sure you want to delete this system?')) {
                try {
                    await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    fetchSystems(); 
                } catch (error) {
                    console.error('Error deleting system:', error);
                }
            }
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const id = document.getElementById('systemId').value;
            const systemData = {
                name: document.getElementById('name').value,
                developer: document.getElementById('developer').value,
                launchDate: document.getElementById('launchDate').value,
                version: document.getElementById('version').value,
                type: document.getElementById('type').value,
                status: document.getElementById('status').value,
            };

            const isUpdating = id !== '';
            const url = isUpdating ? `${API_URL}/${id}` : API_URL;
            const method = isUpdating ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(systemData)
                });

                if (response.ok) {
                    resetForm();
                    fetchSystems();
                } else {
                    console.error('Failed to save system');
                }
            } catch (error) {
                console.error('Error saving system:', error);
            }
        });
        
        cancelButton.addEventListener('click', resetForm);

        document.addEventListener('DOMContentLoaded', fetchSystems);
    </script>
</body>
</html>
